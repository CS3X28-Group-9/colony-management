{% extends "base.html" %}
{% block title %}Family Tree - {{ center_mouse.strain }}{% endblock %}
{% block content %}
  <div
    class="overflow-hidden border rounded-lg bg-white shadow-sm p-4 h-[80vh] text-center"
  >
    <object
      type="image/svg+xml"
      data="{{ url('mouseapp:family_tree_svg', mouse=center_mouse.id) }}"
      class="w-full h-full block"
      style="touch-action: none;"
    >
      Your browser does not support SVG.
    </object>
  </div>
{% endblock %}
